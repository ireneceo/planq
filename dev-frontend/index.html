<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- interactive-widget 기본값(resizes-visual) 사용 — 키보드 up 시 레이아웃 뷰포트(innerHeight)는
         유지되고 visual viewport 만 줄어듦. iOS PWA standalone 에서 resizes-content 는 innerHeight 자체를
         줄이고 document 를 키보드 높이만큼 phantom scroll 시켜(실측 VVDIAG: iH 793→417, off/sY=376)
         position:fixed 레이아웃이 위로 밀리고 아래 흰 여백 → 입력란이 화면 위로 사라지는 회귀 유발.
         #root/body 를 --vvh(visualViewport.height)로 사이징하므로 resizes-content 불필요. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#14B8A6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PlanQ" />
    <meta name="application-name" content="PlanQ" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      사이클 N+17 — Google Fonts weight 축소.
      실 사용: 700 (525곳), 600 (651곳), 500 (202곳), 400 (19곳).
      거의 안 쓰는 200/300/800/900 제거 → 폰트 파일 fetch 19개 → 12개 (약 35% 감소).
      Outfit 은 Landing 페이지에서만 사용하지만 적은 weight 라 그대로 둠 (다음 사이클 lazy 검토).
      display=swap: 폰트 다운로드 동안 fallback 표시 → FOIT 차단, FCP 향상.
    -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>PlanQ</title>
    <!-- 기본 메타 (SEO + SNS 카드) — 공유 페이지의 동적 OG 는 backend SSR 라우트가 별도 처리 (운영 nginx 가 /public/* 을 backend 로 proxy 할 때) -->
    <meta name="description" content="PlanQ — 일이 일이 되지 않게. 업무·프로젝트·사람·시간·고객·청구를 하나로 연결해 시간을 돈으로 바꾸는 수익성 엔진." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PlanQ" />
    <meta property="og:title" content="PlanQ — 일이 일이 되지 않게" />
    <meta property="og:description" content="업무·프로젝트·사람·시간·고객·청구를 하나로 연결해 시간을 돈으로 바꾸는 수익성 엔진." />
    <!-- 사이클 N+23: OG 썸네일 1200×630 (SNS 표준). icon-512 정사각형 → 슬로건 박힌 og-default.png.
         페이지별 OG 는 backend ogMetaMiddleware 가 share bot UA 감지 시 동적 교체. -->
    <meta property="og:image" content="https://planq.kr/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://planq.kr" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PlanQ — 일이 일이 되지 않게" />
    <meta name="twitter:description" content="업무·프로젝트·사람·시간·고객·청구를 하나로 연결해 시간을 돈으로 바꾸는 수익성 엔진." />
    <meta name="twitter:image" content="https://planq.kr/og-default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
