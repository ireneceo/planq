<!doctype html>
<!--
  Capacitor remote URL 방식의 webDir 형식 요건을 채우는 최소 fallback 1장.
  평소엔 로드되지 않음(앱은 server.url = planq.kr/dev.planq.kr 원격 로드).
  첫 로드 실패(비행기모드 등) 시에만 노출 — 네트워크 복귀 후 재시도 안내.
-->
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PlanQ</title>
  <style>
    :root { color-scheme: light; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FAFC; color: #0F172A;
      padding: 24px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      text-align: center;
    }
    .box { max-width: 320px; }
    .brand { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 16px; }
    .msg { font-size: 15px; line-height: 1.6; color: #334155; }
    .sub { font-size: 13px; color: #64748B; margin-top: 6px; }
    button {
      margin-top: 24px; padding: 12px 24px; font-size: 15px; font-weight: 600;
      color: #fff; background: #14B8A6; border: none; border-radius: 8px; cursor: pointer;
    }
    button:active { background: #0F766E; }
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">PlanQ</div>
    <div class="msg" id="msg">네트워크에 연결되어 있지 않습니다.</div>
    <div class="sub" id="sub">연결을 확인한 뒤 다시 시도해 주세요.</div>
    <button id="retry" type="button">다시 시도</button>
  </div>
  <script>
    // 영어 환경이면 문구 교체(i18n 원칙 — placeholder 단독이라 인라인 최소 처리).
    if ((navigator.language || '').slice(0, 2) !== 'ko') {
      document.getElementById('msg').textContent = 'No network connection.';
      document.getElementById('sub').textContent = 'Please check your connection and try again.';
      document.getElementById('retry').textContent = 'Retry';
    }
    document.getElementById('retry').addEventListener('click', function () {
      location.reload();
    });
  </script>
</body>
</html>
