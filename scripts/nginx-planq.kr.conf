# PlanQ 운영 nginx 사이트 설정 (planq.kr)
#
# 설치:
#   sudo cp /opt/planq/scripts/nginx-planq.kr.conf /etc/nginx/sites-available/planq.kr
#   sudo ln -s /etc/nginx/sites-available/planq.kr /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL 인증서 (Let's Encrypt):
#   sudo certbot --nginx -d planq.kr -d www.planq.kr
#   (이 파일에는 SSL 디렉티브가 placeholder 로 들어있음 — certbot 이 자동 채움)
#
# 차이점 (dev.planq.kr 대비):
#   - 백엔드 port 3003 → 3002
#   - Q Note port 8000 → 8001
#   - root /opt/planq/dev-frontend-build → /opt/planq/prod-frontend-build
#   - HSTS 활성 (365일)
#   - X-Frame-Options/CSP 강화

# www → apex 리다이렉트
server {
    server_name www.planq.kr;
    return 301 https://planq.kr$request_uri;

    listen 80;
    listen [::]:80;
    # certbot 이 ssl 디렉티브 추가
}

# 메인 서버 (HTTPS)
server {
    server_name planq.kr;

    # Let's Encrypt 인증서 발급용
    location /.well-known/acme-challenge/ {
        root /opt/planq/prod-frontend-build;
    }

    # 프론트엔드 정적 파일
    root /opt/planq/prod-frontend-build;
    index index.html;

    # ─── 보안 헤더 (운영 강화) ───
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(self)" always;

    # ─── 백엔드 API 프록시 (port 3002) ───
    location /api/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ─── Socket.io ───
    location /socket.io/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Q Note (FastAPI port 8001) ───
    location /qnote/ {
        proxy_pass http://localhost:8001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ─── 정적 파일 캐싱 (1년, immutable) ───
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── HTML 은 항상 no-cache (SPA 함정 방지 — memory: nginx_html_no_cache) ───
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ─── 매니페스트 / SW 도 no-cache ───
    location = /manifest.json { add_header Cache-Control "no-cache, no-store, must-revalidate"; }
    location = /sw.js         { add_header Cache-Control "no-cache, no-store, must-revalidate"; }

    # ─── React Router (SPA) 지원 ───
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── 파일 업로드 크기 제한 ───
    client_max_body_size 50M;

    # ─── Gzip 압축 ───
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # ─── SSL (certbot 이 자동 추가) ───
    listen 443 ssl;
    listen [::]:443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/planq.kr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/planq.kr/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name planq.kr;

    location /.well-known/acme-challenge/ {
        root /opt/planq/prod-frontend-build;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
